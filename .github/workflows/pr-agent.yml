name: PR Agent Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]

jobs:
  pr-agent:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/review'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Run PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AGENT.CONFIG.MODEL: "gpt-4.1"
          PR_AGENT.GITHUB_ACTION_CONFIG.AUTO_REVIEW: "true"
          PR_AGENT.GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: "true"
          PR_AGENT.GITHUB_ACTION_CONFIG.AUTO_IMPROVE: "true"
          PR_AGENT.GITHUB_ACTION_CONFIG.ENABLE_OUTPUT: "true"
          PR_AGENT.GITHUB_ACTION_CONFIG.PR_ACTIONS: '["opened", "synchronize", "reopened", "ready_for_review"]'
